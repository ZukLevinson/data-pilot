<div class="chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-info">
      <p-avatar icon="pi pi-sparkles" shape="circle" size="normal" [style]="{'background-color': '#dbeafe', 'color': '#2563eb'}"></p-avatar>
      <div>
        <h2 class="title">Data Pilot</h2>
        <p class="subtitle">תמיד כאן כדי לעזור</p>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages">
    @for (message of messages(); track message.id) {
      <div class="message-wrapper" [class.user]="message.sender === 'user'">
        <div class="message-bubble">
          <!-- Thinking Section -->
          <div *ngIf="message.thought" class="thought-process">
            <div class="thought-header">
              <i class="pi pi-sparkles"></i>
              <span>Reasoning...</span>
            </div>
            <div class="thought-text">{{ message.thought }}</div>
          </div>
          
          <!-- Actual Answer -->
          <div *ngIf="message.text" class="answer-text">{{ message.text }}</div>
          
          <!-- Typing Indicator if no text and no thought yet -->
          <div *ngIf="!message.text && !message.thought && isWaiting()" class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="message-time">
          {{ message.timestamp | date:'HH:mm' }}
        </div>
      </div>
    }
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <form (ngSubmit)="sendMessage()" class="input-form">
      <textarea 
        pInputTextarea
        [autoResize]="true"
        rows="1"
        [ngModel]="inputText()" 
        (ngModelChange)="inputText.set($event)" 
        (keydown)="handleKeyPress($event)"
        name="messageInput"
        placeholder="הקלד את ההודעה שלך..." 
        autocomplete="off"
        class="message-input w-full"
      ></textarea>
      <p-button 
        type="submit" 
        icon="pi pi-send" 
        size="large"
        [disabled]="!inputText().trim()" 
        [rounded]="true" 
        styleClass="send-button"
      ></p-button>
    </form>
  </div>
</div>
